<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Split</title>
    <script src="../lib/core.js"></script>
    <script src="../lib/split.js"></script>
    <link rel="stylesheet" href="customSplit.css">
    <link rel="stylesheet" href="current.css">
    <style>
        body{
            overflow: hidden;
        }
        .scene {
            position: relative;
            height: 200px;
            width: 425px;
        }

        .scene>span {
            font-size: 1.6em;
            color: #555;
        }

        .mainTimer {
            position: absolute;
            bottom: 0;  
            z-index: 2;
            background: #055B;
            color: #FFF;
            padding: 0 10% 0;
            font-family: gamer;
            font-size:2em;
            width:50%;
            border-top: 3px solid #099;
            border-left: 3px solid #099;
            border-bottom: 3px solid #066;
            border-right: 3px solid #066;
        }
        .timerGold{
            background: #665800;
        }
        #main {
            position: relative;
            width: 425px;
            background-color: #3336; 
            height: 150px; 
            overflow: hidden;
        }

        .segment {
            position: absolute;
            opacity: 0;
            transition: .7s;
            width: 160px;
            height: 75px;
        }

        .segment.current {
            opacity: .75;
            left: 24%;
            top: 25px;
            z-index: 1;
            
        }
        .lastSeg{
            background: #555;
            border-top: 2px solid #777;
            border-right: 2px solid #777;
            border-bottom: 2px solid #333;
            border-left: 2px solid #333;
             width: 100%;
             min-height: 25px;
             font-size: 1.6em;
            color: #FFF;
            font-family: gamer;
        }
        .segment:has(+.current) {
            opacity: .5;
            left: 2%;
            z-index: 0;
        }

        .segment.current+.segment {
            opacity: .5;
            right: 5%;
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="scene">
        <div id="main"></div>
        <div class="lastSeg"></div>
    </div>
    <script>
        let start = false;
        function resetSegment() {
            document.querySelectorAll(".segment").forEach(s => {
                s.classList.remove("current");
            })
        }
        let mainEl = document.getElementById("main");
        let mainSplit = new CustomSplit(mainEl, () => {
            resetSegment();
            mainSplit.splitEl[mainSplit.index].classList.add("current");
        }, () => {
            resetSegment();
            mainSplit.splitEl[mainSplit.index].classList.add("current");
            let lastSeg=document.querySelector(".lastSeg")
            lastSeg.classList.add("lastSeg");
            lastBest=formatTime(mainSplit.lastSplit.best);
            lastSeg.innerHTML=`${mainSplit.lastSplit.name} > ${lastBest}`;
        }, () => {
            mainSplit.updateSplit();
            document.querySelector(".scene").innerHTML += "<span>Fin de la Run !!</span>"
        });
        mainSplit.onLoseTime=()=>{
            document.querySelector(".mainTimer").classList.add(".timerGold");
        }
        mainSplit.loadSplit();
        document.addEventListener("keydown", (e) => {
            if (e.key !== " " && e.key!=="ArrowDown") return;
            if(e.key==" "){
            if (!start) {
                start = true;
                mainSplit.process();
                return;
            }
            mainSplit.next();
        }else{
            mainSplit.skip();
        }
        });
        document.addEventListener("keyup", (e) => {
            if (e.key.toLowerCase() !== "escape")
                return;
            window.location.reload();

        });

        //   mainSplit.process();
    </script>
</body>

</html>
