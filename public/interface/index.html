<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Split - ⚙configuration⚙</title>
    <link rel="stylesheet" href="style.css">
    <link id="theme" rel="stylesheet" href="../exemple/current.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/theme/dracula.min.css">
    <script src="../lib/core.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.15/addon/edit/closebrackets.min.js"></script>
</head>

<body>
    <div class="container">
        <header>
            <h1>Votre Split Customisable</h1>
        </header>
        <main>
            <section>
                <label for="url">url</label>
                <input type="text" id="url">
            </section>
            <menu>
                <a href="#segments">Voir les segments</a>
                <a href="#css">Voir le design</a>
                <a href="#cssEditor">Voir le fichier CSS</a>
            </menu>
            <section target="segments">
                <h2>Segments</h2>
                <ul id="segments"></ul>
                <table id="segTab">
                    <thead>
                        <th>Icons</th>
                        <th>Nom</th>
                        <th>best</th>
                        <th>last</th>
                        <th>Actions</th>
                    </thead>
                    <tbody>
                        <!--Ici les split généré via fetch-->
                    </tbody>
                </table>
                <div>
                    <label for="newSegment">Nouveau segment</label>
                    <input type="text" id="newSegment" placeholder="Nom du segment">
                    <button id="addSegment">➕ Segment</button>
                </div>
                <button id="updateSplit">Mettre à jour</button>
            </section>
            <section target="css">
                <h2>Design</h2>
                <div id="cssTree"></div>
            </section>
            <section target="cssEditor">
                <textarea id="editor"></textarea>
                <button onclick="saveFile()">💾 Sauvegarder</button>
            </section>
        </main>
        <footer>
            © 2026 CecilCordheley. Tous droits réservés.
        </footer>
    </div>
    <script>
        var editor=null;
        async function openEditor(file) {
            if (editor==null) {
                editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
                    lineNumbers: true,
                    mode: "application/css",
                    theme: "dracula",         // Le thème choisi
                    matchBrackets: true,
                    autoCloseBrackets: true,
                    tabSize: 2,           // Indentation en 2 espaces
                    indentUnit: 2,
                    smartIndent: true
                });
            }
            const res = await fetch(file);
            const text = await res.text();
            editor.setValue(text);
        }
        function setLastPropery() {
            const lasts = document.querySelectorAll('details div:last-of-type');
            lasts.forEach(l => {
                let input = l.querySelector("input");
                input.addEventListener("keyup", (e) => {
                    console.dir(e);
                    if (e.code.toLowerCase() == "tab") {
                        let d = document.createElement("div");
                        let input_lbl = document.createElement("input");
                        let input_val = document.createElement("input");
                        d.appendChild(input_lbl);
                        d.appendChild(input_val);
                        input_lbl.addEventListener("blur", () => {
                            let lbl = document.createElement("label");
                            lbl.innerText = input_lbl.value;
                            input_lbl.replaceWith(lbl);
                        });
                        l.appendChild(d);
                    }
                })
                //console.log("last label ",l.querySelector("label").innerText);
            })
        }
        function generateCSSTree() {
            let cssTree = document.getElementById("cssTree");
            const css = document.getElementById("theme");
            const sheet = css.sheet;
            for (const rule of sheet.cssRules) {
                //console.dir(rule.value);
                let divContainer = document.createElement("details");
                divContainer.classList.add("CssElement");

                let selector = document.createElement("summary");
                divContainer.appendChild(selector);
                selector.innerText = rule.selectorText;
                divContainer.dataset.selector = rule.selectorText;
                cssTree.appendChild(divContainer);
                for (const property of rule.style) {
                    if (rule.style.getPropertyValue(property) == "initial")
                        break;
                    let d = document.createElement("div");
                    let lbl = document.createElement("label");
                    lbl.innerText = property;

                    let input = document.createElement("input");
                    input.dataset.property = property;
                    //console.dir(property);
                    input.dataset.selector = rule.selectorText;
                    input.value = rule.style.getPropertyValue(property);
                    input.addEventListener("input", () => {
                        rule.style.setProperty(property, input.value);
                    });
                    //console.dir(input.value);
                    d.appendChild(lbl)
                    d.appendChild(input);
                    divContainer.appendChild(d);
                }
            }
            setLastPropery();
        }

        const sections = document.querySelectorAll("[target]");
        function resetSection() {
            sections.forEach(s => {
                s.style.display = "none";
            })
        }
        resetSection();
        const links = document.querySelectorAll("menu > a");
        links.forEach(l => {
            l.addEventListener("click", function () {
                let target = this.getAttribute("href").substring(1);
                resetSection();
                console.log(`[target="${target}"]`);
                document.querySelector(`[target="${target}"]`).style.display = "block"
            })
        })
        var segments = [];
        var file = "";
        function setEditable() {
            let compoments = document.querySelectorAll(".editable");
            compoments.forEach(c => {
                c.addEventListener("click", () => {
                    let index = c.getAttribute("index_seg");
                    let input = document.createElement("input");
                    input.value = c.innerText;
                    let data=c.getAttribute("data");
                    input.addEventListener("blur", () => {
                        segments[index][data] = input.value;
                        let span = document.createElement("span");
                        span.innerText = input.value;
                        span.classList.add("editable");
                        span.setAttribute("index_seg", index);
                        input.replaceWith(span);
                        setEditable();
                    })
                    c.replaceWith(input);
                })
            })
        }
        async function generateSegments() {

            let list = document.querySelector("#segTab tbody");
            list.innerHTML = "";
            segments.forEach((element, index) => {
                let li = document.createElement("tr");

                for (var f in element) {
                    let span = document.createElement("td");
                    if (["best", "last"].includes(f)) {
                        span.innerText = element[f] > 0 ? formatTime(element[f]) : 0;
                    } else {
                        span.innerText = element[f];
                        span.classList.add("editable");
                        span.setAttribute("data",f);
                        span.setAttribute("index_seg", index);
                    }
                    li.appendChild(span);
                    setEditable()
                }
                let del = document.createElement("button");
                del.innerHTML = "❌";
                del.addEventListener("click", () => {
                    segments.splice(index, 1);
                });
                let reset = document.createElement("button");
                reset.innerHTML = "🔁";
                reset.addEventListener("click", () => {
                    segments[index].best = null;
                    segments[index].last = null;
                });
                let actionCell=document.createElement("td");
                actionCell.appendChild(reset);
                actionCell.appendChild(del);
                li.appendChild(actionCell);
                list.appendChild(li);
            });

        }
        (async () => {
            const param = await fetch("../param.json");
            const reponse = await param.json();
            document.getElementById("url").value = reponse.url;
            cssFile=reponse.css;
            openEditor("../exemple/"+cssFile);
            file = reponse.file;
            try {
                const reponse = await fetch("../data/" + file, {
                    headers: {
                        "Content-Type": "application/json",
                    }
                });
                const result = await reponse.json();
                segments = result;
                generateSegments();
            } catch (err) {
                console.error(err);
            }
        })();
        document.getElementById("addSegment").addEventListener("click", () => {
            const segName = document.getElementById("newSegment");
            if (segName.value == "") return;
            segments.push({icon:"", name: segName.value, best: null, last: null });
            generateSegments("../data/" + file);
        });
        document.getElementById("updateSplit").addEventListener("click", async () => {
            fetch('/api/update', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(segments)
            }).then(r => { return r.json() }).then(result => {
                if (result.status == "ok") {
                    alert("Les segments sont mis à jour !");
                    generateSegments();
                }
            });
        })
        generateCSSTree();
    </script>
</body>

</html>
